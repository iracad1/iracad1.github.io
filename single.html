<html>
	<head>
		<title></title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
	</head>
	<body class="single is-preload" style="background-color: #f4efe9">

		<!-- Wrapper -->
			<div id="wrapper">

				<div id="site-header"></div>

				<!-- Main -->
					<div id="main">
					</div>

				<!-- Footer -->
					<section id="footer">
						<ul class="icons">
							<li><a href="#" class="icon brands fa-twitter"><span class="label">Twitter</span></a></li>
							<li><a href="#" class="icon brands fa-facebook-f"><span class="label">Facebook</span></a></li>
							<li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
							<li><a href="#" class="icon solid fa-rss"><span class="label">RSS</span></a></li>
							<li><a href="#" class="icon solid fa-envelope"><span class="label">Email</span></a></li>
						</ul>
						<p class="copyright">&copy; Untitled. Design: <a href="http://html5up.net">HTML5 UP</a>. Images: <a href="http://unsplash.com">Unsplash</a>.</p>
					</section>

			</div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/components.js"></script>
			<script src="assets/js/posts.js"></script>
			<script src="assets/js/main.js"></script>
			<script>
				(function() {
					var params = new URLSearchParams(window.location.search);
					var index = parseInt(params.get('post'), 10);
					var post = (!isNaN(index) && posts[index]) ? posts[index] : null;
					var $main = $('#main');

					if (!post) {
						$main.html('<article class="post"><p>Post not found. <a href="index.html">Go back home.</a></p></article>');
						return;
					}

					document.title = post.title + ' - ' + siteName;

					var subtitleHtml = post.subtitle ? '<p>' + post.subtitle + '</p>' : '';
					var imageHtml = post.image
						? '<span class="image featured"><img src="' + post.image + '" alt="" /></span>'
						: '';

					var contentHtml = post.content
						? post.content.split('\n\n').map(function(p) { return '<p>' + p + '</p>'; }).join('')
						: '';

					var pdfsHtml = '';
					if (post.pdfs && post.pdfs.length) {
						pdfsHtml = post.pdfs.map(function(pdf) {
							return '<embed src="' + pdf.src + '" type="application/pdf" class="pdf-embed" title="' + pdf.label + '" />';
						}).join('');
					}

					var extraImagesHtml = '';
					if (post.images && post.images.length > 1) {
						extraImagesHtml = post.images.slice(1).map(function(src) {
							return '<span class="image featured"><img src="' + src + '" alt="" /></span>';
						}).join('');
					}

					$main.html([
						'<article class="post">',
						'  <header>',
						'    <div class="title">',
						'      <h2>' + post.title + '</h2>',
						       subtitleHtml,
						'    </div>',
						'    <div class="meta">',
						'      <time class="published" datetime="' + post.date + '">' + new Date(post.date + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) + '</time>',
						'    </div>',
						'  </header>',
						   imageHtml,
						   contentHtml,
						   extraImagesHtml,
						   pdfsHtml,
						'</article>'
					].join('\n'));
				})();
			</script>

	</body>
</html>
